{% load static %}
<!DOCTYPE html>
<html lang="en" class="transition duration-500">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(-45deg,#667eea,#764ba2,#6b8cff,#8f94fb);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
}

@keyframes gradientBG {
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
}

.dark .glass {
    background: rgba(0,0,0,0.35);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    transform: translateY(-18px);
    font-size:12px;
    color:#6366f1;
}

.auth-container {
    position: relative;
    overflow: hidden;
}

.form-wrapper {
    transition: transform 0.6s ease-in-out;
    display:flex;
    width:200%;
}

.form-section {
    width:50%;
    padding:2rem;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<button id="themeToggle"
class="fixed top-5 right-5 px-4 py-2 rounded-full bg-black text-white dark:bg-white dark:text-black">
🌙
</button>

<div class="glass w-full max-w-2xl rounded-2xl shadow-2xl auth-container">

<div id="formWrapper" class="form-wrapper">

<!-- ================= SIGNUP ================= -->
<div class="form-section">
<h2 class="text-2xl text-white font-bold mb-6 text-center">Create Account</h2>

<form method="POST" action="{% url 'signup' %}" class="space-y-5">
{% csrf_token %}

<div class="input-group relative">
<input type="text" name="username" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 dark:bg-gray-800 text-black dark:text-white">
<label class="absolute left-3 top-3 text-gray-500 transition-all duration-300">
Username
</label>
</div>

<div class="input-group relative">
<input type="email" name="email" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 dark:bg-gray-800 text-black dark:text-white">
<label class="absolute left-3 top-3 text-gray-500 transition-all duration-300">
Email
</label>
</div>

<div class="input-group relative">
<input type="password" id="signupPassword" name="password" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 dark:bg-gray-800 text-black dark:text-white pr-10">
<label class="absolute left-3 top-3 text-gray-500 transition-all duration-300">
Password
</label>

<span onclick="togglePassword('signupPassword')" 
class="absolute right-3 top-3 cursor-pointer">👁</span>

<div class="h-2 bg-gray-300 rounded mt-2">
<div id="strengthBar" class="h-2 rounded"></div>
</div>
</div>

<button type="submit"
class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold">
Sign Up
</button>

<p class="text-center text-white mt-4">
Already have an account?
<span onclick="switchToLogin()" class="text-yellow-300 cursor-pointer">Login</span>
</p>
</form>
</div>

<!-- ================= LOGIN ================= -->
<div class="form-section">
<h2 class="text-2xl text-white font-bold mb-6 text-center">Login</h2>

<form method="POST" action="{% url 'login' %}" class="space-y-5">
{% csrf_token %}

<div class="input-group relative">
<input type="text" name="username" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 dark:bg-gray-800 text-black dark:text-white">
<label class="absolute left-3 top-3 text-gray-500 transition-all duration-300">
Username
</label>
</div>

<div class="input-group relative">
<input type="password" id="loginPassword" name="password" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 dark:bg-gray-800 text-black dark:text-white pr-10">
<label class="absolute left-3 top-3 text-gray-500 transition-all duration-300">
Password
</label>

<span onclick="togglePassword('loginPassword')" 
class="absolute right-3 top-3 cursor-pointer">👁</span>
</div>

<p class="text-right">
<span onclick="openForgot()" 
class="text-yellow-300 cursor-pointer text-sm">
Forgot Password?
</span>
</p>

<button type="submit"
class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold">
Login
</button>

<p class="text-center text-white mt-4">
Don't have an account?
<span onclick="switchToSignup()" class="text-yellow-300 cursor-pointer">Sign Up</span>
</p>
</form>
</div>

</div>
</div>

<!-- ================= FORGOT MODAL ================= -->
<div id="forgotModal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="glass p-6 rounded-xl w-96">
<h3 class="text-white text-lg mb-4">Reset Password</h3>

<form method="POST" action="{% url 'password_reset' %}">
{% csrf_token %}
<input type="email" name="email" placeholder="Enter your email"
class="w-full p-3 rounded-lg mb-4">

<button type="submit"
class="w-full py-2 bg-indigo-600 text-white rounded-lg">
Send Reset Link
</button>
</form>

<button onclick="closeForgot()"
class="mt-3 text-red-400 text-sm">
Cancel
</button>
</div>
</div>

<script>
// DARK MODE
const html = document.documentElement;
const toggleBtn = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="dark"){
html.classList.add("dark");
toggleBtn.innerText="☀";
}

toggleBtn.onclick=()=>{
html.classList.toggle("dark");
if(html.classList.contains("dark")){
localStorage.setItem("theme","dark");
toggleBtn.innerText="☀";
}else{
localStorage.setItem("theme","light");
toggleBtn.innerText="🌙";
}
};

// SWITCH FORMS
const wrapper = document.getElementById("formWrapper");

function switchToLogin(){
wrapper.style.transform="translateX(-50%)";
}

function switchToSignup(){
wrapper.style.transform="translateX(0%)";
}

// PASSWORD TOGGLE
function togglePassword(id){
const input = document.getElementById(id);
input.type = input.type==="password"?"text":"password";
}

// PASSWORD STRENGTH
const strengthBar=document.getElementById("strengthBar");
document.getElementById("signupPassword")
.addEventListener("input",function(){
let val=this.value;
let strength=0;
if(val.length>6) strength++;
if(/[A-Z]/.test(val)) strength++;
if(/[0-9]/.test(val)) strength++;
if(/[@$!%*?&]/.test(val)) strength++;

const colors=["red","orange","yellow","green"];
strengthBar.style.width=(strength*25)+"%";
strengthBar.style.background=colors[strength-1]||"transparent";
});

// FORGOT MODAL
function openForgot(){
document.getElementById("forgotModal").classList.remove("hidden");
}
function closeForgot(){
document.getElementById("forgotModal").classList.add("hidden");
}
</script>

</body>
</html>
