{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo - Log-in</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="{% static 'index.css' %}">
    <script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>


</head>
<body>
    <div class="signup-login">
        <div class="signup-box">
        <form method="post" id="loginForm" class="form-container">
            {% csrf_token %}
            <div class="heading">
                Login
            </div>
        <div class="line"></div>
        <div class="field">
            <b>Username</b>
            <input type="text" required class="inp" placeholder="enter your username" name="frm" value="{{ frm|default:'' }}">
        </div>
        <div class="field">
            <b>Password</b>
            <input type="password" class="inp" name="pwd" required>
        </div>
        {% if messages %}
        <div class="messages" style="margin:12px;">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" style="padding:10px;border-radius:6px;margin-bottom:8px;background:#fff3f3;color:#8a1f1f;">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="field">
            <input type="submit" class="submit-button" value="Login">
        </div>
        </form>
        <div class="field">
            <b class="create-account-text">Create new account</b>
            <a class="anc" href="/">Signup</a>
        </div>
        </div>
    </div>
</body>
</html>
