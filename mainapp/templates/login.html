{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo - Log-in</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="{% static 'index.css' %}">
    <script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>


</head>
<body>

<div class="theme-toggle">
    <i class="fas fa-moon" id="themeIcon"></i>
</div>

<div class="signup-login">

    <!-- Floating Blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="signup-box">

        <form method="post" id="loginForm" class="form-container">
            {% csrf_token %}

            <div class="heading">Login</div>
            <div class="line"></div>

            <div class="field input-group">
                <i class="fas fa-user icon"></i>
                <input type="text" required class="inp"
                       placeholder="Enter your username"
                       name="frm"
                       value="{{ frm|default:'' }}">
            </div>

            <div class="field input-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" class="inp" id="password"
                       name="pwd" required
                       placeholder="Enter your password">
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="alert">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <div class="field">
                <input type="submit" class="submit-button" value="Login">
            </div>
        </form>

        <div class="switch-auth">
            <span class="create-account-text">Create new account</span>
            <a class="anc" href="/">Signup</a>
        </div>

    </div>
</div>

<script src="{% static 'main.js' %}"></script>
</body>
</html>
