{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(-45deg,#667eea,#764ba2,#6b8cff,#8f94fb);
    background-size: 400% 400%;
    animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    border-radius: 50%;
    top: 10%;
    left: 20%;
    animation: floatGlow 12s ease-in-out infinite alternate;
    z-index: -1;
}

@keyframes floatGlow {
from { transform: translateY(0px) translateX(0px); }
to { transform: translateY(80px) translateX(60px); }
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    transform: translateY(-18px);
    font-size: 12px;
    color: #6366f1;
}
</style>
</head>

<body class="flex items-center justify-center p-4">

<div class="bg-glow"></div>

<div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">

<h1 class="text-3xl font-bold text-white text-center mb-6">
Login
</h1>

<form method="POST" class="space-y-6">
{% csrf_token %}

<div class="input-group relative">
<input type="text" name="frm" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 text-black focus:outline-none">
<label class="absolute left-3 top-3 text-gray-600 transition-all duration-300 pointer-events-none">
Username
</label>
</div>

<div class="input-group relative">
<input type="password" id="loginPassword" name="pwd" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 text-black focus:outline-none pr-10">
<label class="absolute left-3 top-3 text-gray-600 transition-all duration-300 pointer-events-none">
Password
</label>

<span onclick="togglePassword()" class="absolute right-3 top-3 cursor-pointer">👁</span>
</div>

<button type="submit"
class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold transition transform hover:scale-105">
Login
</button>

<div class="mt-6 text-center space-y-2">
<p class="text-white text-sm">
Don't have an account?
<a href="{% url 'signup' %}" class="text-yellow-300 hover:underline">Sign Up</a>
</p>

<p class="text-white text-sm">
<a href="{% url 'password_reset' %}" class="text-yellow-300 hover:underline">
Forgot Password?
</a>
</p>
</div>

{% if messages %}
    <div class="form-messages">
        {% for message in messages %}
            <div class="alert {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

</form>
</div>

<script>
function togglePassword(){
const pass=document.getElementById("loginPassword");
pass.type=pass.type==="password"?"text":"password";
}
</script>

</body>
</html>
