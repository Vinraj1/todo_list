{% load static %}
<!DOCTYPE html>
<html lang="en" class="transition duration-500">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* =========================
   DYNAMIC ANIMATED BACKGROUND
========================= */
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;

    background: linear-gradient(
        -45deg,
        #667eea,
        #764ba2,
        #6b8cff,
        #8f94fb
    );

    background-size: 400% 400%;
    animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Floating glow effect */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    border-radius: 50%;
    top: 10%;
    left: 20%;
    animation: floatGlow 12s ease-in-out infinite alternate;
    z-index: -1;
}

@keyframes floatGlow {
    from { transform: translateY(0px) translateX(0px); }
    to { transform: translateY(80px) translateX(60px); }
}

/* Glass card */
.glass {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.15);
}

.dark .glass {
    background: rgba(0, 0, 0, 0.35);
}

/* Floating label animation */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    transform: translateY(-18px);
    font-size: 12px;
    color: #6366f1;
}
</style>
</head>

<body class="flex items-center justify-center p-4">

<div class="bg-glow"></div>

<div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">

<h1 class="text-3xl font-bold text-white text-center mb-6">
Create Account
</h1>

<form method="POST" action="{% url 'login' %}" class="space-y-6">
{% csrf_token %}

<!-- Username -->
<div class="input-group relative">
<input type="text" name="username" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 text-black focus:outline-none">
<label class="absolute left-3 top-3 text-gray-600 transition-all duration-300 pointer-events-none">
Username
</label>
</div>

<!-- Email -->
<div class="input-group relative">
<input type="email" name="email" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 text-black focus:outline-none">
<label class="absolute left-3 top-3 text-gray-600 transition-all duration-300 pointer-events-none">
Email
</label>
</div>

<!-- Password -->
<div class="input-group relative">
<input type="password" id="password" name="password" required placeholder=" "
class="w-full p-3 rounded-lg bg-white/80 text-black focus:outline-none pr-10">
<label class="absolute left-3 top-3 text-gray-600 transition-all duration-300 pointer-events-none">
Password
</label>

<span onclick="togglePassword()"
class="absolute right-3 top-3 cursor-pointer">
👁
</span>

<!-- Strength bar -->
<div class="h-2 bg-gray-300 rounded mt-2">
<div id="strengthBar" class="h-2 rounded"></div>
</div>
</div>

<button type="submit"
class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold transition transform hover:scale-105 duration-300">
Sign Up
</button>

<!-- Login + Forgot -->
<div class="mt-6 text-center space-y-2">

<p class="text-white text-sm">
Already have an account?
<a href="{% url 'login' %}" class="text-yellow-300 hover:underline">
Login
</a>
</p>

<p class="text-white text-sm">
<a href="{% url 'password_reset' %}" class="text-yellow-300 hover:underline">
Forgot Password?
</a>
</p>

</div>

{% if messages %}
    <div class="form-messages">
        {% for message in messages %}
            <div class="alert {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

</form>

</div>

<script>
/* =========================
   PASSWORD TOGGLE
========================= */
function togglePassword(){
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* =========================
   PASSWORD STRENGTH
========================= */
const passwordInput = document.getElementById("password");
const strengthBar = document.getElementById("strengthBar");

passwordInput.addEventListener("input", () => {
    const val = passwordInput.value;
    let strength = 0;

    if(val.length > 6) strength++;
    if(/[A-Z]/.test(val)) strength++;
    if(/[0-9]/.test(val)) strength++;
    if(/[@$!%*?&]/.test(val)) strength++;

    const colors = ["red","orange","yellow","green"];
    strengthBar.style.width = (strength * 25) + "%";
    strengthBar.style.background = colors[strength-1] || "transparent";
});
</script>

</body>
</html>
