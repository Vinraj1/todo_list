{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo - Sign-up</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="{% static 'index.css' %}">
    <script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>


</head>
<body>
    <div class="signup-login">
        <div class="signup-box">
            <form method="post" id="signupForm">
                {% csrf_token %}
                <div class="heading">
                    Signup
                </div>
                <div class="line"></div>
                <div class="field">
                    <b>Username</b>
                    <input type="text" required class="inp" placeholder="Enter your username" name="frm">
                </div>
                <div class="field">
                    <b>Email</b>
                    <input type="email" required class="inp" name="email">
                </div>
                <div class="field">
                    <b>Password</b>
                    <input type="password" class="inp" name="pwd" id="pwd" required>
                    <small class="pwd-hint">
                </div>
                {% if messages %}
                <div class="messages" style="margin:12px;">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}" style="margin-bottom:8px;color:#8a1f1f;">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
                <div class="field">
                    <input type="submit" class="submit-button" value="Signup">
                </div>
            </form>
        <div class="field switch-auth">
            <b class="switch-text">Already have an account?</b>
            <a class="anc" href="login">Login</a>
        </div>
        </div>
    </div>
</body>
</html>
