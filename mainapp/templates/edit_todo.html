{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Todo</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    min-height:100vh;
    background: linear-gradient(-45deg,#667eea,#764ba2,#6b8cff,#8f94fb);
    background-size:400% 400%;
    animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
}
</style>
</head>

<body class="flex items-center justify-center p-4">

<div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">

<h1 class="text-2xl text-white text-center mb-6 font-bold">
Edit Task
</h1>

<form method="POST">
{% csrf_token %}

<input type="text" name="title" value="{{ obj.title }}"
class="w-full p-3 rounded-lg bg-white/80 mb-6 focus:outline-none">

<button type="submit"
class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition transform hover:scale-105">
Update
</button>

</form>

<div class="text-center mt-6">
<a href="{% url 'todopage' %}"
class="text-white underline hover:text-yellow-300">
Back to Todo
</a>
</div>

</div>
</body>
</html>
