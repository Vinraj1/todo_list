{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="{% static 'index.css' %}">
    <script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="theme-toggle">
    <i class="fas fa-moon" id="themeIcon"></i>
</div>

<div class="signup-login">

    <div id="particles-js"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="signup-box scr">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Hello {{user}}</h2>
            <a href="{% url 'signout' %}">
                <i class="fa-solid fa-right-from-bracket"></i>
            </a>
        </div>

        <div class="heading">Edit Task</div>
        <div class="line"></div>

        <form method="post" id="editForm">
            {% csrf_token %}

            <div class="field floating-group">
                <i class="fas fa-pen icon"></i>
                <input type="text"
                       name="title"
                       value="{{obj.title}}"
                       required
                       placeholder=" "
                       class="inp">
                <label>Edit your task</label>
            </div>

            <input type="hidden" name="srno" value="{{obj.srno}}">

            <button type="submit" class="submit-button" id="updateBtn">
                <span class="btn-text">Update Task</span>
                <span class="spinner"></span>
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="{% static 'main.js' %}"></script>

</body>
</html>
