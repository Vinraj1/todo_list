{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Page</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    min-height:100vh;
    background: linear-gradient(-45deg,#667eea,#764ba2,#6b8cff,#8f94fb);
    background-size:400% 400%;
    animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
}
</style>
</head>

<body class="flex items-center justify-center p-4">

<div class="glass w-full max-w-2xl p-8 rounded-2xl shadow-2xl">

<h1 class="text-3xl text-white text-center mb-6 font-bold">
Your Todo List
</h1>

<form method="POST" action="{% url 'todopage' %}" class="flex gap-3 mb-6">
{% csrf_token %}
<input type="text" name="title" placeholder="Enter new task"
class="flex-1 p-3 rounded-lg bg-white/80 focus:outline-none">

<button type="submit"
class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition transform hover:scale-105">
Add
</button>

{% if messages %}
    <div class="form-messages">
        {% for message in messages %}
            <div class="alert {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

<div class="space-y-4"></div>
{% for i in data %}
<div class="flex justify-between items-center bg-white/80 p-4 rounded-lg">

<span>{{ i.task }}</span>

<div class="space-x-3">
<a href="{% url 'edit_todo' i.srno %}"
class="px-3 py-1 bg-yellow-400 hover:bg-yellow-500 text-white rounded transition">
Edit
</a>

<a href="{% url 'delete_todo' i.srno %}"
class="px-3 py-1 bg-red-500 hover:bg-red-600 text-white rounded transition">
Delete
</a>
</div>

</div>
{% endfor %}
</div>

<div class="text-center mt-6">
<a href="{% url 'signout' %}"
class="text-white underline hover:text-red-300">
Sign Out
</a>
</div>

</form>

</div>
</body>
</html>
